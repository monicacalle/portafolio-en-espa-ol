<!-- sección de contacto -->
<section class="contact" id="contact">
    <div class="contact__wrapper">
        <div class="contact__intro">
            <span class="contact__eyebrow">Contacto</span>
            <h2 class="contact__title">Creemos algo con intención juntos.</h2>
            <p class="contact__lead">
                Si tienes un proyecto, una colaboración o una oportunidad en mente, me encantará saber de ti.
            </p>
            <a class="contact__mail" href="mailto:monicacalle369@gmail.com">monicacalle369@gmail.com</a>

            <div class="contact__tags">
                <span class="contact__tag">Desarrollo Front-End</span>
                <span class="contact__tag">Diseño UI</span>
                <span class="contact__tag">Dirección creativa</span>
            </div>
        </div>

        <form class="contact__form" action="/send-form" method="post">
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="first-name">Nombre</label>
                        <input class="contact__input" id="first-name" type="text" name="first-name" required /><span class="contact__span-text"
                            >Nombre</span
                        >
                        <span class="contact__span-line"></span>
                    </div>
                </div>
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="last-name">Apellido</label>
                        <input id="last-name" type="text" name="last-name" required class="contact__input" />
                        <span class="contact__span-text">Apellido</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="email">Correo electrónico</label>
                        <input id="email" type="email" name="email" required class="contact__input" />
                        <span class="contact__span-text">Correo electrónico</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="mobile">Teléfono</label>
                        <input id="mobile" class="contact__input" type="tel" name="telefono" required />
                        <span class="contact__span-text">Teléfono</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="message">Mensaje</label>
                        <textarea class="textarea" name="message" id="message" cols="30" rows="10" required></textarea>
                        <span class="contact__span-text">Escribe tu mensaje aquí...</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <button class="contact__btn" type="submit" title="Haz clic para enviar tu mensaje">Enviar</button>
                </div>
            </div>
        </form>
    </div>
</section>
